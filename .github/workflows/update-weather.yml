name: Daily Weather Fetch & Deploy

on:
  schedule:
    - cron: '0 3 * * *' 
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Fetch Open-Meteo Data
        run: node scripts/fetch-weather.js

      - name: Commit Data to Main
        id: commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/forecast.json
          if git commit -m "chore: daily weather update [skip ci]"; then
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to data"
            echo "committed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build React App
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
