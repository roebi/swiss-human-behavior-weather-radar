name: Daily Weather Fetch

on:
  schedule:
    - cron: '0 3 * * *' # Runs at 03:00 UTC daily (04:00 CET)
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Open-Meteo Data
        run: node scripts/fetch-weather.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/forecast.json
          git commit -m "chore: daily weather data update" || exit 0
          git push

